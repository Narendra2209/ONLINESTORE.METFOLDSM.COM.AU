version: '3.8'

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: metfold
      MONGO_INITDB_ROOT_PASSWORD: metfold_secret

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - mongodb
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://metfold:metfold_secret@mongodb:27017/metfold?authSource=admin
      JWT_SECRET: change-this-to-a-secure-secret
      JWT_REFRESH_SECRET: change-this-to-another-secure-secret
      CORS_ORIGIN: http://localhost:3000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api/v1

volumes:
  mongodb_data:
